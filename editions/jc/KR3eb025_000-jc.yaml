body:
  text: 正文人身之脈本乎榮衛榮者陰血衛者陽氣榮行脈中衛行脈外脈不自行隨氣而至氣動脈應陰陽之義氣如橐籥血如波瀾血脈氣息上下循環十二經中皆有動脈手太陰經可得而息此經屬肺上系吭嗌脈之大會息之出入初持脈時令仰其掌掌後高骨是謂關上關前為陽關後為陰陽寸陰尺先後推尋寸關與尺兩手各有揣得高骨上下左右男女脈同惟尺則異陽弱陰盛反此病至調停自氣呼吸定息四至五至平和之則三至名遲遲則為冷六至為數數即熱證轉遲轉冷轉數轉熱在人消息在人差別遲數即得即辨浮沉浮表沉里深淺酌斟浮數表熱遲數里熱浮遲表虛沉遲冷結察其六部的在何處一部兩經一臟一腑左寸屬心合於小腸關為肝膽尺腎膀胱右寸主肺大腸同條關則脾胃尺命三焦不特臟腑身亦主之上下中央三部分齊寸候胸上關候膈下尺候於臍直至跟踝左脈候左右脈候右病隨所在不病者否浮沉遲數有內外因外因於天內緣於人天則陰陽風雨晦明人喜怒憂思悲恐驚外因之浮則為表證沉里遲寒數則熱盛內因浮脈虛風所為沉氣遲冷數躁何疑表裡寒熱風氣冷燥辨內外因脈證參考浮沉之脈亦有當然浮為心肺沉屬腎肝脾者中州浮沉之問肺重三菽皮毛相得六菽為心得之血脈脾九菽重得於肌肉肝與筋平重十二菽惟有腎脈獨沉之極按之至骨舉指來疾脈理浩繁總括於四六難七難專衍其義析而言之七表八里又有九道其名乃備浮而無力是名芤脈有力為洪形狀可識沉而有力其脈為實無力微弱伏則沉極脈遲有力滑而流利無力緩澀退同一例數而有力脈名為緊小緊為弦疑似宜審合則為四離為七八天機之秘神授之訣舉之有餘按之不足泛泛浮浮如水漂木芤脈何似絕類慈蔥指下成窟有邊無中滑脈如珠往來轉旋舉按皆盛實脈則然弦如張弦緊如細線洪較之浮大而力健隱隱約約微渺難尋舉無按有便指為沉似遲不遲是謂之緩如雨沾沙澀難而短遲則極緩伏按至骨濡則軟軟弱則忽忽既知七表又知八里九道之形不可不記諸家九道互有去取不可相無可以相有過於本位相引曰長短則不及來去乖張形大力薄其虛可知促結俱止促數結遲代止不然止難回之三脈皆止當審毫釐牢比弦緊轉堅轉勁動則動搖厥厥不定細如一線小而有力弦大虛芤脈曰改革渙漫不收其脈為散急疾曰數脈最易見即脈求病病無不明病參之脈可決死生然有應病有不相應此最宜詳不可執定人安脈病是曰行屍人病脈和可保無危中風脈浮滑兼痰氣其或沉滑勿以風治或浮或沉而微而虛扶危溫痰風未可疏寒中太陽浮緊而澀及傳而變各狀難悉陽明則長少陽則弦太陰入里遲沉必兼及入少陰其脈遂緊厥陰熱深脈伏厥冷在陽當汗次利小便表解里病其脈實堅此其大略治法之正至於大法自有仲景傷寒有五脈非一端陰陽俱盛緊澀者寒陽浮而滑陰濡而弱此名中風勿用寒藥陽濡而弱陰小而急此非風寒乃濕溫病陰陽俱盛病熱之極浮之而滑沉之散澀惟有溫病脈散諸經各隨所在不可指名暑傷於氣所以脈虛弦細芤遲體狀無餘或澀或細或濡或緩是皆中濕可得而斷瘧脈自弦弦遲多寒弦數多熱隨時變遷風寒濕氣合而為痹浮澀而緊三脈乃備腳氣之脈其狀有四浮弦為風濡弱濕氣遲澀因寒洪數熱鬱風汗濕溫熱下寒熨腰痛之脈皆沉而弦兼浮者風兼緊者寒濡細則濕實則閃肭指下既明治斯不忒尺脈虛弱緩澀而緊病為足痛或是痿病澀則無血厥寒為甚尺微無陰下痢逆冷熱厥脈伏時或而數便秘必難治不可錯疝脈弦急積聚在裡牢急者生弱急者死沉遲浮澀疝瘕寒痛痛甚則伏或細或動風寒暑濕氣鬱生涎下虛上實皆暈而眩風浮寒緊濕細暑虛涎弦而滑虛脈則無治眩暈法尤當審諦先理痰氣次隨證治滑數為嘔代者霍亂微滑者生澀數凶斷偏弦為飲或沉弦滑或結或伏痰飲中節咳嗽所因浮風緊寒數熱細濕房勞澀難右關濡者飲食傷脾左關弦短疲極肝衰浮短肺傷法當咳嗽五臟之嗽各視本部浮緊虛寒沉數實熱洪滑多痰弦澀少血形盛脈細不足以息沉少伏匿皆是死脈惟有浮大而嗽者生外證內脈參考秤停下手脈沉便知是氣沉極則伏澀弱難治其或沉滑氣兼痰飲沉弦細動皆氣痛證心痛在寸腹痛在關下部在尺脈象顯然心中驚悸脈必代結飲食之悸沉伏動滑癲癇之脈浮洪大長滑大堅疾痰蓄心狂乍大乍小乍長乍短此皆邪脈神志昏亂汗脈浮虛或澀或濡軟散洪大渴飲無餘遺精白濁當驗於尺結芤動緊二證之的鼻頭色黃小便必難脈浮弦澀為不小便便血則芤數則赤黃實脈癃閉熱在膀胱諸證失血皆見芤脈隨其上下以驗所出大凡失血脈貴沉細設見浮大後必難治水腫之證有陰有陽察脈觀色問證須詳陰脈沉遲其色青白不渴而瀉小便清澀脈或沉數色赤而黃燥屎赤溺兼渴為陽脹滿脈弦脾制於肝洪數熱脹遲弱陰寒浮為虛滿緊則中實浮則可治虛則危急胸痞脈滑為有痰結弦伏亦痞澀則氣劣肝積肥氣弦細青色心為伏梁沉芤色赤脾積痞氣浮大而長其色脾土中央之黃肺積息賁浮毛色白奔豚屬腎沉急面黑五臟為積六腑為聚積在本位聚無定處駃緊浮牢小而沉實或結或伏為聚為積實強者生沉小者死生死之別病同脈異氣口緊盛為傷於食食不消化浮滑而疾滑而不勻必是吐瀉霍亂之候脈代勿訝夏月泄瀉脈應暑濕洪而數溲脈必虛極治暑溫瀉分其小便虛脫固腸罔或不痊無僓不痢脈宜滑大浮弦急死沉細無害五疽實熱脈必洪數如或微澀證其虛弱骨蒸勞熱脈數而虛熱而澀小必殞其膒如汗加咳非藥可除頭痛陽弦浮風緊寒風熱洪數溫細而堅氣虛頭痛雖弦必澀痰厥則滑腎厥堅實癰疽浮數惡寒發熱若有痛處癰疽所發脈數發熱而疼者陽不數不熱不疼陰瘡發癰之脈弦洪相搏細沉而滑肺肝俱數寸數而實肺癰已成寸數虛澀肺痿之形肺癰色白脈宜短澀死者浮大不白而赤腸癰難知滑數可推數而不熱腸癰何疑遲緊未膿下以平之洪數膿成不下為宜陰搏於下陽別於上血氣和調有子之象手之少陰其脈動甚尺按不絕沉為有孕少陰屬心心主血脈骨為胞門脈應於尺或寸脈微關滑尺數往來流利如雀之啄或診三部浮沉一止或平而虛當問月水男女之別以左右取左疾為男右疾為女沉實在右浮大在右右女左男可以為吋離經六至沉細而滑陣痛連腰胎即時脫血瘕弦急而大者生虛小弱者即見死形半產漏下革脈主之弱即血耗立見傾危診小兒脈浮沉為先浮表沉里便知其源大小滑澀虛實遲駃容依脈形以審證治大凡婦人及夫嬰稚病同丈人脈即同例惟有婦人胎產血氣小兒驚疳變蒸等類各有方法與丈夫異要知婦孺貴識證形問始之詳脈難盡憑望聞問切神聖工巧愚者脈脈明者了了病脈診法大略如斯若乃持脈猶所當知謂如春弦夏名鉤脈秋則為毛冬則為石實強大過病見於外虛微不及病決在內四脈各異四時各論皆以胃氣而為之本胃氣者何脈之中和過與不及皆是偏頗春主肝木夏主心火脾土乘旺則在長夏秋主肺金冬主腎水五臟脈象與五運配肝脈弦長厭匕聶匕指下尋之如循揄葉益堅而滑如循長竿是謂太過受病於肝急如張弦又如循刀如按琴瑟肝死之應浮大如散心和且安累匕如環如循琅玕病則益數如雞舉足死操帶鉤後踞前曲浮澀而短藹匕如蓋此肺之平按之益大病如循羽不下不上死則消索吹毛颺匕沉濡而滑腎乎則若上大下銳滑如雀啄腎之病脈啄啄連屬連屬之中然而微曲來如解索去如彈石已死之腎在人審識脾者中州平和不見然亦可察中大而緩來如雀啄如滴漏水脾臟之衰脈乃見此又有肥瘦修長侏儒肥沉瘦浮短促長疏各分診法不可一途難盡者意難窮者理得之於心應之於指勉旃小子日誦琅琅造道之玄
